<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>urban texture index</title>
    <meta
      name="description"
      content=""
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <p class="site-kicker">living archive of trans-formed and trans-boundary surfaces.</p>
        <div class="site-intro">
          <h1>urban texture index</h1>
          <p>
            indexing texture...Индексация текстуры
          </p>
        </div>
        <div class="site-meta">
          <p id="record-count">Loading archive...</p>
          <button id="shuffle-button" class="archive-control" type="button">shuffle</button>
        </div>
      </header>

      <main class="archive-layout">
        <section aria-label="Archive entries" class="archive-panel">
          <div class="archive-viewport" id="archive-viewport">
            <div class="archive-grid" id="archive-grid"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="detail-template">
      <div class="detail-copy">
        <h2 class="detail-title"></h2>
        <p class="detail-id"></p>
        <p class="detail-notes"></p>
        <dl class="detail-metadata"></dl>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
